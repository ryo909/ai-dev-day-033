<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Day033 — 流れ見直しボード</title><meta name="description" content="作業の流れのつまる場所を見つけるためのツールです。"><style>
